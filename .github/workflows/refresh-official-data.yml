name: Refresh official data cache

on:
  schedule:
    - cron: "25 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      SEC_USER_AGENT: "mining-screener research ops@example.com"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm refresh:data:force
      - run: pnpm build
      - name: Commit refreshed cache
        run: |
          if git diff --quiet data/official-cache.json; then
            echo "No official cache changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/official-cache.json
          git commit -m "Refresh official data cache"
          git push
